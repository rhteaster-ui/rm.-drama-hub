<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD08A"/>
      <stop offset="60%" stop-color="#FF8A1F"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0D0A07" stroke="rgba(255,170,80,0.25)"/>
  <text x="50%" y="56%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, 'Playfair Display', serif" font-style="italic"
        font-weight="700" font-size="34" fill="url(#g)" filter="url(#glow)">rm.</text>
</svg>
